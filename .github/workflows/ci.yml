name: React CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    # Keep tests active to protect your production build
    - name: Run Tests
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        CI: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ✨ NEW STEP: Log in to Docker Hub using the secure secrets we created
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets::DOCKERHUB_USERNAME }}
        password: ${{ secrets::DOCKERHUB_TOKEN }}

    # ✨ MODIFIED STEP: We now change push to 'true' and dynamically tag the image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true # Changed from false to true!
        # This tags the image with your username/repository-name
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/k8s-react-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/k8s-react-app:${{ github.sha }}