name: React CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    # We still keep tests to ensure we don't build a Docker image of broken code!
    - name: Run Tests
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        CI: true

    # ✨ NEW STEP 1: Set up Docker Buildx (an extended toolset for building images)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ✨ NEW STEP 2: Build the Docker image inside the GitHub Runner
    - name: Build Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false # We set this to false for now because we aren't sending it to a registry yet
        tags: k8s-react-app:latest