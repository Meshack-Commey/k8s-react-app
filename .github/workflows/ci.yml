name: React CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # ✨ Fixed: Updated to Node 22 to clear the deprecation warning
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    # ✨ Fixed: Added CI=true environment variable. 
    # This forces React to treat warnings as errors and prevents tests from running indefinitely.
    - name: Run Tests
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        CI: true

    - name: Build Project
      run: npm run build
      env:
        CI: true # ✨ Ensures the build step handles warnings strictly and cleanly